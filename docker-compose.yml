services:

  postgres:
    image: postgres:16
    container_name: wms-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog
    container_name: wms-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data: